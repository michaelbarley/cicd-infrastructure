version: 2

models:
  - name: stg_weather_daily
    description: Deduplicated daily weather readings, one row per city per date
    columns:
      - name: city
        tests:
          - not_null
      - name: date
        tests:
          - not_null
      - name: temperature_max
        tests:
          - not_null
      - name: temperature_min
        tests:
          - not_null
